# Netlify build config.
#
# Because the GitHub repo has the project nested inside a `koatji-dashboard/`
# folder (instead of files at the top), `base` tells Netlify to cd into that
# folder before doing anything else. From there:
#   - run `npm run build` (defined in koatji-dashboard/package.json)
#   - serve the contents of koatji-dashboard/dist/ (Vite's output folder)
#   - use Node 20 (current LTS)

[build]
  base = "koatji-dashboard"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Send every URL to index.html so React-style routing works on hard refresh.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
